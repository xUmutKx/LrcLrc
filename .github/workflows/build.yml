name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # elle de tetikleyebilirsin (gh workflow run veya GitHub arayüzünden)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # NOT: bu projede gradlew gerçek bir Gradle wrapper değil (gradle-wrapper.jar yok,
      # gradlew sadece "exec gradle" diyen bir shim). Bu yüzden ./gradlew yerine
      # setup-gradle action'ı ile runner'a gerçek Gradle kuruluyor ve doğrudan
      # "gradle" komutu çağrılıyor - Termux'ta da aynı şekilde sistem gradle'ı kullanılıyor.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LrcLrc-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
